name: Build sunfish SukiSU kernel
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc bison flex libssl-dev libelf-dev \
            build-essential python3 python-is-python3 lz4 cpio kmod zip unzip \
            rsync ca-certificates curl

      - name: Add swap
        run: |
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile || true
          sudo fallocate -l 12G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Build kernel
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernel-out
          path: out/
